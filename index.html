<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Development Workshop</title>
    <link rel="stylesheet" href="style.css">

   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="container">

     
        <div class="header">
            <h1>Web Development Workshop</h1>
            <p>Number of available seats: 23</p>
        </div>

   
        <div class="content">

            <div class="left">
                <img src="./Assets/img.png" alt="image">
            </div>

           
            <div class="right">
                <form>

                    <div class="input-box">
                        <i class="fa fa-user"></i>
                        <input type="text" placeholder="Username" required>
                    </div>

                    <div class="input-box">
                        <i class="fa fa-envelope"></i>
                        <input type="email" placeholder="Email" required>
                    </div>

                    <div class="input-box">
                        <i class="fa fa-phone"></i>
                        <input type="text" placeholder="Phone No" required>
                    </div>

                    <div class="input-box">
                        <i class="fa fa-check-square"></i>
                        <input type="number" placeholder="Choose no of seats">
                    </div>

                    <div class="input-box">
                        <i class="fa fa-user-plus"></i>
                        <input type="text" placeholder="Second username">
                    </div>

                    
                    <div class="buttons">
                        <button class="submit">Submit</button>
                        <button class="cancel" type="reset">Cancel</button>
                    </div>

                </form>
            </div>

        </div>

    </div>

</body>
</html>
